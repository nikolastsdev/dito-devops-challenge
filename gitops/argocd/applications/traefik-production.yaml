apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik-production
  namespace: argocd
  labels:
    app.kubernetes.io/name: traefik
    environment: production
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: infra

  source:
    repoURL: https://helm.traefik.io/traefik
    chart: traefik
    targetRevision: "33.x"
    helm:
      releaseName: traefik
      values: |
        deployment:
          replicas: 2

        service:
          type: LoadBalancer
          annotations:
            networking.gke.io/load-balancer-ip-addresses: "dito-traefik-production"

        ports:
          web:
            port: 8000
            expose:
              default: true
            exposedPort: 80

        ingressRoute:
          dashboard:
            enabled: false

        ingressClass:
          enabled: true
          isDefaultClass: false
          name: traefik

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: traefik
                  topologyKey: kubernetes.io/hostname

  destination:
    server: https://kubernetes.default.svc
    namespace: traefik

  # Production: sync manual — aprovação humana no ArgoCD UI
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

  revisionHistoryLimit: 5
