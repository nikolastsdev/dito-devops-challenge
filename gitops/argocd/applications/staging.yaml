apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dito-api-staging
  namespace: argocd
  labels:
    app.kubernetes.io/name: dito-api
    environment: staging
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: dito-challenge

  source:
    repoURL: https://github.com/nikolastsdev/dito-devops-challenge
    targetRevision: main
    path: manifests/overlays/staging

  destination:
    server: https://kubernetes.default.svc
    namespace: dito-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m

  revisionHistoryLimit: 5
