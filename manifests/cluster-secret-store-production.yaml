# ClusterSecretStore — production
#
# Aplicar UMA VEZ após o cluster GKE production estar pronto:
#   kubectl apply -f manifests/cluster-secret-store-production.yaml \
#     --context=gke_dito-challenge-production_southamerica-east1_dito-gke-production
#
# Pré-requisito: External Secrets Operator instalado no cluster
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#
# Autenticação: Workload Identity (KSA dito-api → GSA criada pelo Terraform)
# O Terraform já fez:
#   - criou GSA dito-app-production@dito-challenge-production.iam.gserviceaccount.com
#   - deu roles/secretmanager.secretAccessor no project
#   - binding: KSA dito-api (ns dito-app) → GSA acima
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  provider:
    gcpsm:
      projectID: dito-challenge-production
      auth:
        workloadIdentity:
          clusterLocation: southamerica-east1
          clusterName: dito-gke-production
          serviceAccountRef:
            name: dito-api
            namespace: dito-app
