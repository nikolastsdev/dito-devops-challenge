# ExternalSecret — sincroniza DB_PASSWORD do GCP Secret Manager para um K8s Secret
#
# Fluxo:
#   GCP Secret Manager (dito-db-password-<env>)
#       ↓  [Workload Identity: KSA dito-api → GSA dito-app-<env>@]
#   External Secrets Operator
#       ↓  refreshInterval: 1h
#   Kubernetes Secret "dito-api-secrets"
#       ↓  secretKeyRef
#   Pod env var DB_PASSWORD
#
# O nome do secret remoto é sobrescrito pelo overlay de cada ambiente:
#   staging    → dito-db-password-staging
#   production → dito-db-password-production
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dito-api-secrets
  namespace: dito-app
  labels:
    app.kubernetes.io/name: dito-api
    app.kubernetes.io/component: backend
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: dito-api-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: db_password
      remoteRef:
        key: dito-db-password-staging
