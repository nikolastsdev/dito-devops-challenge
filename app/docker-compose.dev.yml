services:
  postgres:
    image: postgres:16-alpine
    container_name: groove-postgres-dev
    environment:
      POSTGRES_DB: groove
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme-local-only}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d groove"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: node:20-alpine
    container_name: groove-api-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: groove
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-changeme-local-only}
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: node:20-alpine
    container_name: groove-web-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_dev_data:
