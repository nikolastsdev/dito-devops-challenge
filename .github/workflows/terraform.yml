name: Terraform

on:
  pull_request:
    paths:
      - 'iac/**'
      - 'scripts/**'
      - '.github/workflows/terraform.yml'
  push:
    branches: [main]
    paths:
      - 'iac/**'
      - 'scripts/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente alvo'
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      action:
        description: 'Ação a executar'
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - bootstrap-cluster
          - destroy

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_VERSION: '1.11.3'
  TF_IN_AUTOMATION: 'true'
  ARGOCD_VERSION: '7.8.23'
  WORKING_DIR: iac

# ──────────────────────────────────────────────────────────────────────────────
# HELPERS — reaproveitados em vários jobs
# ──────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Validate (sempre) ────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate

  # ── 2. Plan Staging ─────────────────────────────────────────────────────────
  plan-staging:
    name: Plan Staging
    needs: validate
    if: |
      vars.GCP_PROJECT_ID_STAGING != '' && (
        github.event_name == 'pull_request' ||
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' &&
          github.event.inputs.environment == 'staging' &&
          contains(fromJson('["plan","apply"]'), github.event.inputs.action))
      )
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - run: terraform init -backend-config=backends/staging.gcs.tfbackend -reconfigure
      - name: Plan staging
        env:
          TF_VAR_db_admin_password: ${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}
        run: |
          terraform plan -var-file=environments/staging.tfvars -input=false -no-color \
            | tee ../plan-staging.txt
      - uses: actions/upload-artifact@v4
        with:
          name: plan-staging
          path: plan-staging.txt

  # ── 3. Plan Production ──────────────────────────────────────────────────────
  plan-production:
    name: Plan Production
    needs: validate
    if: |
      vars.GCP_PROJECT_ID_PRODUCTION != '' && (
        github.event_name == 'pull_request' ||
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' &&
          github.event.inputs.environment == 'production' &&
          contains(fromJson('["plan","apply"]'), github.event.inputs.action))
      )
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - run: terraform init -backend-config=backends/production.gcs.tfbackend -reconfigure
      - name: Plan production
        env:
          TF_VAR_db_admin_password: ${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}
        run: |
          terraform plan -var-file=environments/production.tfvars -input=false -no-color \
            | tee ../plan-production.txt
      - uses: actions/upload-artifact@v4
        with:
          name: plan-production
          path: plan-production.txt

  # ── 4. Apply Staging ────────────────────────────────────────────────────────
  apply-staging:
    name: Apply Staging
    needs: [plan-staging]
    if: |
      vars.GCP_PROJECT_ID_STAGING != '' && (
        (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
        (github.event_name == 'workflow_dispatch' &&
          github.event.inputs.environment == 'staging' &&
          github.event.inputs.action == 'apply')
      )
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - run: terraform init -backend-config=backends/staging.gcs.tfbackend -reconfigure
      - run: terraform apply -var-file=environments/staging.tfvars -auto-approve -input=false
        env:
          TF_VAR_db_admin_password: ${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}

  # ── 5. Apply Production ─────────────────────────────────────────────────────
  apply-production:
    name: Apply Production
    needs: [plan-production]
    if: |
      vars.GCP_PROJECT_ID_PRODUCTION != '' && (
        (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
        (github.event_name == 'workflow_dispatch' &&
          github.event.inputs.environment == 'production' &&
          github.event.inputs.action == 'apply')
      )
    runs-on: ubuntu-latest
    environment: production  # requer aprovação manual no GitHub
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - run: terraform init -backend-config=backends/production.gcs.tfbackend -reconfigure
      - run: terraform apply -var-file=environments/production.tfvars -auto-approve -input=false
        env:
          TF_VAR_db_admin_password: ${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}

  # ── 6. Bootstrap Cluster (ArgoCD + Applications) ────────────────────────────
  # Roda automaticamente após apply-staging, ou manual via workflow_dispatch
  bootstrap-cluster-staging:
    name: Bootstrap Cluster Staging
    needs: [apply-staging]
    if: |
      always() &&
      needs.apply-staging.result == 'success' &&
      vars.GCP_PROJECT_ID_STAGING != ''
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID_STAGING }}
          install_components: gke-gcloud-auth-plugin

      - name: Get cluster credentials
        run: |
          gcloud container clusters get-credentials dito-gke-staging \
            --region southamerica-east1 \
            --project ${{ vars.GCP_PROJECT_ID_STAGING }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Install ArgoCD
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --create-namespace \
            --version ${{ env.ARGOCD_VERSION }} \
            --set server.service.type=ClusterIP \
            --set configs.params."server\.insecure"=true \
            --wait --timeout 5m

      - name: Apply AppProjects
        run: |
          kubectl apply -f gitops/argocd/projects/infra.yaml
          kubectl apply -f gitops/argocd/projects/dito-challenge.yaml

      - name: Apply Applications
        run: |
          kubectl apply -f gitops/argocd/applications/traefik-staging.yaml
          kubectl apply -f gitops/argocd/applications/staging.yaml

      - name: Show status
        run: |
          echo "=== ArgoCD Applications ==="
          kubectl get applications -n argocd 2>/dev/null || echo "aguardando ArgoCD..."
          echo ""
          echo "=== Traefik LB (aguardar IP) ==="
          kubectl get svc -n traefik 2>/dev/null || echo "aguardando Traefik..."
          echo ""
          echo "Senha ArgoCD admin:"
          kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath='{.data.password}' 2>/dev/null | base64 -d && echo || true

  bootstrap-cluster-production:
    name: Bootstrap Cluster Production
    needs: [apply-production]
    if: |
      always() &&
      needs.apply-production.result == 'success' &&
      vars.GCP_PROJECT_ID_PRODUCTION != ''
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID_PRODUCTION }}
          install_components: gke-gcloud-auth-plugin

      - name: Get cluster credentials
        run: |
          gcloud container clusters get-credentials dito-gke-production \
            --region southamerica-east1 \
            --project ${{ vars.GCP_PROJECT_ID_PRODUCTION }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Install ArgoCD
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update
          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --create-namespace \
            --version ${{ env.ARGOCD_VERSION }} \
            --set server.service.type=ClusterIP \
            --set configs.params."server\.insecure"=true \
            --wait --timeout 5m

      - name: Apply AppProjects and Applications
        run: |
          kubectl apply -f gitops/argocd/projects/infra.yaml
          kubectl apply -f gitops/argocd/projects/dito-challenge.yaml
          kubectl apply -f gitops/argocd/applications/traefik-production.yaml
          kubectl apply -f gitops/argocd/applications/production.yaml

      - name: Show status
        run: |
          kubectl get applications -n argocd 2>/dev/null || true
          kubectl get svc -n traefik 2>/dev/null || true

  # ── 7. Destroy — apenas via workflow_dispatch ────────────────────────────────
  # Requer aprovação manual (environment gate) para ambos os ambientes
  destroy-staging:
    name: "⚠️ Destroy Staging"
    needs: validate
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'staging' &&
      github.event.inputs.action == 'destroy' &&
      vars.GCP_PROJECT_ID_STAGING != ''
    runs-on: ubuntu-latest
    environment: staging  # approval gate
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID_STAGING }}
          install_components: gke-gcloud-auth-plugin

      # Remove ArgoCD e workloads antes do destroy para evitar recursos órfãos
      - name: Drain ArgoCD Applications
        run: |
          gcloud container clusters get-credentials dito-gke-staging \
            --region southamerica-east1 --project ${{ vars.GCP_PROJECT_ID_STAGING }} 2>/dev/null || true
          kubectl delete applications --all -n argocd --ignore-not-found=true 2>/dev/null || true
          kubectl delete namespace traefik dito-app --ignore-not-found=true 2>/dev/null || true
          echo "Workloads removidos (se cluster existia)."

      - run: terraform init -backend-config=backends/staging.gcs.tfbackend -reconfigure

      - name: Terraform Destroy Staging
        env:
          TF_VAR_db_admin_password: ${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}
        run: |
          terraform destroy -var-file=environments/staging.tfvars -auto-approve -input=false

  destroy-production:
    name: "⚠️ Destroy Production"
    needs: validate
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'production' &&
      github.event.inputs.action == 'destroy' &&
      vars.GCP_PROJECT_ID_PRODUCTION != ''
    runs-on: ubuntu-latest
    environment: production  # approval gate obrigatório
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID_PRODUCTION }}
          install_components: gke-gcloud-auth-plugin

      - name: Drain ArgoCD Applications
        run: |
          gcloud container clusters get-credentials dito-gke-production \
            --region southamerica-east1 --project ${{ vars.GCP_PROJECT_ID_PRODUCTION }} 2>/dev/null || true
          kubectl delete applications --all -n argocd --ignore-not-found=true 2>/dev/null || true
          kubectl delete namespace traefik dito-app --ignore-not-found=true 2>/dev/null || true
          echo "Workloads removidos (se cluster existia)."

      - run: terraform init -backend-config=backends/production.gcs.tfbackend -reconfigure

      - name: Terraform Destroy Production
        env:
          TF_VAR_db_admin_password: ${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}
        run: |
          terraform destroy -var-file=environments/production.tfvars -auto-approve -input=false
