name: Terraform

on:
  pull_request:
    paths:
      - 'iac/**'
      - '.github/workflows/terraform.yml'
  push:
    branches: [main]
    paths:
      - 'iac/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente alvo'
        required: true
        default: staging
        type: choice
        options: [staging, production]
      action:
        description: 'Ação a executar'
        required: true
        default: plan
        type: choice
        options: [plan, apply, bootstrap, destroy]

# Impede runs paralelos no mesmo ambiente — evita conflito de state lock
concurrency:
  group: terraform-${{ github.event.inputs.environment || 'staging' }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_VERSION: '1.11.3'
  TF_IN_AUTOMATION: 'true'
  ARGOCD_VERSION: '7.8.23'
  WORKING_DIR: iac

jobs:
  # ── 1. Validate ─────────────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate

  # ── 2. Plan Staging ──────────────────────────────────────────────────────────
  # Roda em: PR, push main, dispatch staging (plan|apply|bootstrap)
  plan-staging:
    name: Plan Staging
    needs: validate
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.environment == 'staging' &&
       github.event.inputs.action != 'destroy' &&
       github.event.inputs.action != 'bootstrap')
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - run: terraform init -backend-config=backends/staging.gcs.tfbackend -reconfigure
      - name: Terraform Plan
        env:
          TF_VAR_db_admin_password: ${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}
        run: |
          terraform plan -var-file=environments/staging.tfvars \
            -input=false -no-color | tee ../plan-staging.txt
      - uses: actions/upload-artifact@v4
        with:
          name: plan-staging
          path: plan-staging.txt

  # ── 3. Plan Production ───────────────────────────────────────────────────────
  # Roda em: PR, dispatch production (plan|apply|bootstrap)
  plan-production:
    name: Plan Production
    needs: validate
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.environment == 'production' &&
       github.event.inputs.action != 'destroy')
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - run: terraform init -backend-config=backends/production.gcs.tfbackend -reconfigure
      - name: Terraform Plan
        env:
          TF_VAR_db_admin_password: ${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}
        run: |
          terraform plan -var-file=environments/production.tfvars \
            -input=false -no-color | tee ../plan-production.txt
      - uses: actions/upload-artifact@v4
        with:
          name: plan-production
          path: plan-production.txt

  # ── 4. Apply Staging ─────────────────────────────────────────────────────────
  # Roda em: push main, dispatch staging apply
  apply-staging:
    name: Apply Staging
    needs: plan-staging
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.environment == 'staging' &&
       github.event.inputs.action == 'apply')
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - run: terraform init -backend-config=backends/staging.gcs.tfbackend -reconfigure
      - name: Terraform Apply
        env:
          TF_VAR_db_admin_password: ${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}
        run: terraform apply -var-file=environments/staging.tfvars -auto-approve -input=false

  # ── 5. Apply Production ──────────────────────────────────────────────────────
  # Apenas dispatch manual — requer aprovação no GitHub Environment
  apply-production:
    name: Apply Production
    needs: plan-production
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'production' &&
      github.event.inputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - run: terraform init -backend-config=backends/production.gcs.tfbackend -reconfigure
      - name: Terraform Apply
        env:
          TF_VAR_db_admin_password: ${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}
        run: terraform apply -var-file=environments/production.tfvars -auto-approve -input=false

  # ── 6. Bootstrap Cluster Staging ─────────────────────────────────────────────
  # Após apply-staging OU dispatch manual (action=bootstrap)
  bootstrap-cluster-staging:
    name: Bootstrap Cluster Staging
    needs: [validate, apply-staging]
    if: |
      always() && (
        needs.apply-staging.result == 'success' ||
        (github.event_name == 'workflow_dispatch' &&
         github.event.inputs.environment == 'staging' &&
         github.event.inputs.action == 'bootstrap')
      )
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID_STAGING }}
          install_components: gke-gcloud-auth-plugin
      - uses: azure/setup-helm@v4
        with:
          version: v3.17.3
      - name: Bootstrap cluster (idempotente)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq gettext-base
          chmod +x scripts/bootstrap-cluster.sh
          ./scripts/bootstrap-cluster.sh staging

  # ── 7. Bootstrap Cluster Production ──────────────────────────────────────────
  bootstrap-cluster-production:
    name: Bootstrap Cluster Production
    needs: [validate, apply-production]
    if: |
      always() && (
        needs.apply-production.result == 'success' ||
        (github.event_name == 'workflow_dispatch' &&
         github.event.inputs.environment == 'production' &&
         github.event.inputs.action == 'bootstrap')
      )
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID_PRODUCTION }}
          install_components: gke-gcloud-auth-plugin
      - uses: azure/setup-helm@v4
        with:
          version: v3.17.3
      - name: Bootstrap cluster (idempotente)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq gettext-base
          chmod +x scripts/bootstrap-cluster.sh
          ./scripts/bootstrap-cluster.sh production

  # ── 8. Destroy Staging ────────────────────────────────────────────────────────
  # Apenas dispatch manual — requer aprovação no GitHub Environment
  destroy-staging:
    name: Destroy Staging
    needs: validate
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'staging' &&
      github.event.inputs.action == 'destroy'
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID_STAGING }}
          install_components: gke-gcloud-auth-plugin
      - name: Drain workloads
        run: |
          gcloud container clusters get-credentials dito-gke-staging \
            --region southamerica-east1 --project ${{ vars.GCP_PROJECT_ID_STAGING }} 2>/dev/null || true
          kubectl delete applications --all -n argocd --ignore-not-found=true 2>/dev/null || true
          kubectl delete namespace traefik dito-app --ignore-not-found=true 2>/dev/null || true
      - run: terraform init -backend-config=backends/staging.gcs.tfbackend -reconfigure
      - name: Terraform Destroy
        env:
          TF_VAR_db_admin_password: ${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}
        run: terraform destroy -var-file=environments/staging.tfvars -auto-approve -input=false

  # ── 9. Destroy Production ─────────────────────────────────────────────────────
  destroy-production:
    name: Destroy Production
    needs: validate
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'production' &&
      github.event.inputs.action == 'destroy'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID_PRODUCTION }}
          install_components: gke-gcloud-auth-plugin
      - name: Drain workloads
        run: |
          gcloud container clusters get-credentials dito-gke-production \
            --region southamerica-east1 --project ${{ vars.GCP_PROJECT_ID_PRODUCTION }} 2>/dev/null || true
          kubectl delete applications --all -n argocd --ignore-not-found=true 2>/dev/null || true
          kubectl delete namespace traefik dito-app --ignore-not-found=true 2>/dev/null || true
      - run: terraform init -backend-config=backends/production.gcs.tfbackend -reconfigure
      - name: Terraform Destroy
        env:
          TF_VAR_db_admin_password: ${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}
        run: terraform destroy -var-file=environments/production.tfvars -auto-approve -input=false
