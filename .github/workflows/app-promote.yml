name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Git SHA a promover (vazio = promove o SHA atual do staging)'
        required: false
        type: string

permissions:
  contents: write
  id-token: write

env:
  IMAGE_NAME: dito-api
  GCP_REGION: southamerica-east1

jobs:
  promote:
    name: Promote Staging → Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Resolve SHA a promover
        id: sha
        run: |
          if [[ -n "${{ inputs.sha }}" ]]; then
            SHA="${{ inputs.sha }}"
          else
            # Lê o SHA atual do manifesto de staging
            SHA=$(grep 'newTag:' manifests/overlays/staging/kustomization.yaml | awk '{print $2}' | tr -d '"')
          fi

          if [[ -z "$SHA" || "$SHA" == "staging-latest" ]]; then
            echo "Erro: SHA inválido ou staging ainda não foi deployado ('${SHA}')" >&2
            exit 1
          fi

          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "Promovendo SHA: ${SHA}"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.sha }}
          path: app-src

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID_PRODUCTION }}

      - name: Build & Push image (production)
        run: |
          SHA="${{ steps.sha.outputs.sha }}"
          PROJECT="${{ vars.GCP_PROJECT_ID_PRODUCTION }}"
          REGISTRY="${{ env.GCP_REGION }}-docker.pkg.dev"
          REPO="${REGISTRY}/${PROJECT}/dito-api-production/${{ env.IMAGE_NAME }}"
          gcloud auth configure-docker "${REGISTRY}" --quiet
          docker build -t "${REPO}:${SHA}" app-src/app/
          docker push "${REPO}:${SHA}"

      - name: Update production manifest (GitOps)
        run: |
          SHA="${{ steps.sha.outputs.sha }}"
          PROJECT="${{ vars.GCP_PROJECT_ID_PRODUCTION }}"
          REGISTRY="${{ env.GCP_REGION }}-docker.pkg.dev"
          NEW_NAME="${REGISTRY}/${PROJECT}/dito-api-production/${{ env.IMAGE_NAME }}"
          FILE="manifests/overlays/production/kustomization.yaml"

          sed -i "s|newName: .*|newName: ${NEW_NAME}|" "${FILE}"
          sed -i "s|newTag: .*|newTag: ${SHA}|"         "${FILE}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${FILE}"
          git diff --cached --quiet || git commit -m "chore(deploy): production → ${SHA:0:7} [skip ci]"
          git push origin main

      - name: Summary
        run: |
          SHA="${{ steps.sha.outputs.sha }}"
          echo "### Promote Production" >> "$GITHUB_STEP_SUMMARY"
          echo "- **SHA promovido**: \`${SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image**: \`${{ env.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_PRODUCTION }}/dito-api-production/${{ env.IMAGE_NAME }}:${SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- ArgoCD sincronizará automaticamente o production" >> "$GITHUB_STEP_SUMMARY"
