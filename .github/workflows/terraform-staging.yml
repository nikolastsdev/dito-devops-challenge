name: Terraform Staging

# Fluxo automático de staging:
#   • Pull Request  → validate + plan (preview, sem aplicar)
#   • Push em main  → validate → plan → apply → bootstrap
#   • Dispatch      → plan | apply | bootstrap (conveniência manual)
on:
  pull_request:
    paths:
      - 'iac/**'
      - '.github/workflows/terraform-staging.yml'
  push:
    branches: [main]
    paths:
      - 'iac/**'
      - '.github/workflows/terraform-staging.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Ação'
        required: true
        default: plan
        type: choice
        options: [plan, apply, bootstrap]

concurrency:
  group: terraform-staging-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_VERSION: '1.11.3'
  TF_IN_AUTOMATION: 'true'
  WORKING_DIR: iac

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate

  plan:
    name: Plan
    needs: validate
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'bootstrap')
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - run: terraform init -backend-config=backends/staging.gcs.tfbackend -reconfigure
      - name: Terraform Plan
        env:
          TF_VAR_db_admin_password: ${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}
        run: |
          terraform plan -var-file=environments/staging.tfvars \
            -input=false -no-color | tee ../plan-staging.txt
      - uses: actions/upload-artifact@v4
        with:
          name: plan-staging
          path: plan-staging.txt

  apply:
    name: Apply
    needs: plan
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - run: terraform init -backend-config=backends/staging.gcs.tfbackend -reconfigure
      - name: Terraform Apply
        env:
          TF_VAR_db_admin_password: ${{ secrets.TF_VAR_DB_ADMIN_PASSWORD }}
        run: terraform apply -var-file=environments/staging.tfvars -auto-approve -input=false

  bootstrap:
    name: Bootstrap Cluster
    needs: [validate, apply]
    if: |
      always() && (
        needs.apply.result == 'success' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'bootstrap')
      )
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID_STAGING }}
          install_components: gke-gcloud-auth-plugin
      - uses: azure/setup-helm@v4
        with:
          version: v3.17.3
      - name: Bootstrap cluster (idempotente)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq gettext-base
          chmod +x scripts/bootstrap-cluster.sh
          ./scripts/bootstrap-cluster.sh staging
