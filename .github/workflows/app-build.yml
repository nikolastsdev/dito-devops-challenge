name: App Build

on:
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/app-build.yml'
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/app-build.yml'

permissions:
  contents: read
  security-events: write
  id-token: write

env:
  IMAGE_NAME: dito-api
  GCP_REGION: southamerica-east1
  KUSTOMIZE_VERSION: v5.4.3
  # Nome lógico da imagem na base (chave usada pelo `kustomize edit set image`)
  BASE_IMAGE: southamerica-east1-docker.pkg.dev/PROJECT/dito-api-staging/dito-api

jobs:
  # ── 1. Build, lint e scan (PR + push) ───────────────────────────────────────
  build:
    name: Build & Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install
          npm install --prefix server
          npm install --prefix web

      - name: Lint TypeScript
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Build Docker image (local, para scan)
        run: docker build -t "${{ env.IMAGE_NAME }}:ci" .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: app/trivy-results.sarif
        continue-on-error: true

  # ── 2. Deploy staging (push main) — build once, push by digest, GitOps ──────
  deploy-staging:
    name: Deploy Staging
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: write   # commit do manifesto kustomize
      id-token: write    # WIF
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID_STAGING }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build & push image (by digest)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: app
          push: true
          tags: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_STAGING }}/dito-api-staging/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install kustomize
        run: |
          curl -sLo kustomize.tar.gz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${{ env.KUSTOMIZE_VERSION }}/kustomize_${{ env.KUSTOMIZE_VERSION }}_linux_amd64.tar.gz"
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/

      - name: Update staging overlay (kustomize edit set image)
        env:
          NEW_NAME: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_STAGING }}/dito-api-staging/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cd manifests/overlays/staging
          # Referência por digest (sha256) — imutável, rastreável, padrão GitOps
          kustomize edit set image "${BASE_IMAGE}=${NEW_NAME}@${DIGEST}"
          cat kustomization.yaml

      - name: Commit & push manifest
        run: |
          SHORT="${GITHUB_SHA:0:7}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifests/overlays/staging/kustomization.yaml
          if git diff --cached --quiet; then
            echo "Nenhuma mudança no manifesto — nada a commitar"
            exit 0
          fi
          git commit -m "chore(deploy): staging dito-api @ ${SHORT} [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Summary
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          {
            echo "### 🚀 Deploy Staging"
            echo "- **Commit**: \`${GITHUB_SHA:0:7}\`"
            echo "- **Digest**: \`${DIGEST}\`"
            echo "- ArgoCD sincroniza o staging automaticamente ao detectar o commit no manifesto"
          } >> "$GITHUB_STEP_SUMMARY"
